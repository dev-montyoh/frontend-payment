name: Push Workflow (master)

on:
  push:
    branches:
      - master

jobs:
  detect_changes:
    runs-on: ubuntu-latest
    outputs:
      any_changed: ${{ steps.changed.outputs.any_changed }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Get changed files
        id: changed
        uses: tj-actions/changed-files@v47
        with:
          files: |
            app.js
            bin/**
            routes/**
            public/**
            common/**
            package.json
            package-lock.json
            Dockerfile
            .env.prod

  push_master:
    needs: detect_changes
    if: needs.detect_changes.outputs.any_changed == 'true'
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Check out Secrets store
        uses: actions/checkout@v5
        with:
          repository: 'dev-montyoh/secrets-store'
          token: ${{ secrets.SECRETS_STORE_ACCESS_TOKEN }}
          path: secrets-store

      - name: Load secrets
        uses: ./secrets-store/.github/actions/load-secrets
        with:
          SECRETS_STORE_ACCESS_TOKEN: ${{ secrets.SECRETS_STORE_ACCESS_TOKEN }}

      - name: Check out iac-terraform
        uses: actions/checkout@v5
        with:
          repository: 'dev-montyoh/iac-terraform'
          token: ${{ secrets.SECRETS_STORE_ACCESS_TOKEN }}
          path: iac-terraform

      - name: Log in to Github Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ env.DOCKER_REGISTRY_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Push ARM64 Docker Image
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -t ghcr.io/${{ github.repository_owner }}/frontend-payment:latest \
            -t ghcr.io/${{ github.repository_owner }}/frontend-payment:${{ github.run_number }} \
            --push \
            .

      - name: Deploy stack
        uses: ./iac-terraform/.github/actions/stack-deploy
